version: '3.8'

services:
  netpod:
    image: busybox:latest
    ports:
      - "5556:5556"  # Dex
      - "3002:3002"  # Excalidraw
    command: ["sleep", "infinity"]
    networks:
      - excalidraw-network

  dex:
    image: dexidp/dex:v2.38.0
    container_name: excalidraw-dex
    restart: unless-stopped
    volumes:
      - ./config/dex.config.yaml:/etc/dex/config.yaml
    environment:
      - OIDC_REDIRECT_URL=${OIDC_REDIRECT_URL:-http://192.168.8.13:3002/auth/callback}
      - OIDC_CLIENT_SECRET=${OIDC_CLIENT_SECRET:-excalidraw-secret}
      - OIDC_CLIENT_ID=${OIDC_CLIENT_ID:-excalidraw}
      - OIDC_ISSUER=${OIDC_ISSUER:-http://192.168.8.13:5556}
    command: ["dex", "serve", "/etc/dex/config.yaml"]
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://192.168.8.13:5556/.well-known/openid-configuration"]
      interval: 1s
      timeout: 1s
      retries: 10
      start_period: 10s
    network_mode: service:netpod

  excalidraw:
#    image: ghcr.io/betterandbetterii/excalidraw-full:latest
    image: excalidraw-complete:18
    volumes:
      - ./data:/root/data
      - ./excalidraw.db:/root/excalidraw.db:Z
      - ./.env:/root/.env
    depends_on:
      dex:
        condition: service_healthy
    network_mode: service:netpod

networks:
  excalidraw-network:
    driver: bridge
